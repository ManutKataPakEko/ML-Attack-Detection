version: "3.9"

services:
  attack-detection:
    build: .
    container_name: attack-detection-service
    ports:
      - "50051:50051"
      - "9999:8000"
    environment:
      # ========== Model & Data Configuration ==========
      - MODEL_PATH=/app/models/attack-detection-v0.1.1.pkl
      - PROCESSED_DATA_DIR=/app/data/processed/v0.1.1

      # ========== Server Configuration ==========
      - GRPC_PORT=50051
      - GRPC_WORKERS=10
      - REST_PORT=8000
      - REST_HOST=0.0.0.0
      - REST_RELOAD=false

      # ========== Database Configuration ==========
      - DATABASE_URL=postgresql://postgres:g1ojsjaya@postgres_attack_detection:5432/attack_detection

      # ========== MLflow ==========
      - MLFLOW_TRACKING_URI=http://mlflow:5000

      # ========== Logging Configuration ==========
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs

      # ========== Environment ==========
      - ENV=production
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1

    volumes:
      - ./logs:/app/logs
      - ./models:/app/models:ro
      - ./data:/app/data:ro

    restart: unless-stopped
    depends_on:
      - mlflow

    networks:
      - ojs-attack-detection-based-on-log_ojs-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    container_name: mlflow-server
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    restart: unless-stopped
    networks:
      - ojs-attack-detection-based-on-log_ojs-network

networks:
  ojs-attack-detection-based-on-log_ojs-network:
    external: true